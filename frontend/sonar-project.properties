sonar.projectKey=juniorhamish_dajohnston_frontend
sonar.organization=juniorhamish

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=portal-frontend

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=src

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Code coverage settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.exclusions=dist/**,src/generated/**
sonar.coverage.exclusions=**/*.test.*,src/vitest-setup.ts,src/generated/**
sonar.cpd.exclusions=**/*.test.*
