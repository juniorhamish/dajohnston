openapi: 3.1.1
info:
  title: Multi-App Portal API
  version: 1.0.0
  description: API for the Multi-App Portal hub.

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /actuator/info:
    get:
      tags:
        - Application
      summary: Retrieve application information
      operationId: getApplicationInfo
      responses:
        '200':
          description: Application information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActuatorInfo'
  /api/users/me:
    get:
      tags:
        - Users
      summary: Get current user profile
      description: Returns the profile of the currently authenticated user, auto-creating it if it doesn't exist.
      operationId: getCurrentUser
      responses:
        '200':
          description: Successfully retrieved user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Unauthorized
    patch:
      tags:
        - Users
      summary: Update user profile
      operationId: updateCurrentUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProfileRequest'
      responses:
        '200':
          description: Successfully updated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
  /api/households:
    get:
      tags:
        - Households
      summary: List households for the current user
      description: Returns all households that the currently authenticated user is a member of.
      operationId: listHouseholds
      responses:
        '200':
          description: Successfully retrieved households
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Households'
        '401':
          description: Unauthorized
    post:
      tags:
        - Households
      summary: Create a new household
      operationId: createHousehold
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHouseholdRequest'
      responses:
        '201':
          description: Successfully created household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Household'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
  /api/households/{householdId}/join:
    post:
      tags:
        - Households
      summary: Join an existing household
      operationId: joinHousehold
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successfully joined household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Household'
        '401':
          description: Unauthorized
        '404':
          description: Household not found
  /api/apps:
    get:
      tags:
        - Apps
      summary: List available sub-applications
      description: Returns all active sub-applications available in the portal.
      operationId: listApps
      responses:
        '200':
          description: Successfully retrieved available apps
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Apps'
        '401':
          description: Unauthorized
  /api/households/{householdId}/invitations:
    post:
      tags:
        - Households
      summary: Invite a user to a household
      operationId: inviteUser
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteUserRequest'
      responses:
        '201':
          description: Successfully created invitation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Only owners can invite
        '404':
          description: Household not found
  /api/invitations:
    get:
      tags:
        - Invitations
      summary: List pending invitations for the current user
      description: Returns all pending invitations for the currently authenticated user's email.
      operationId: listPendingInvitations
      responses:
        '200':
          description: Successfully retrieved pending invitations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitations'
        '401':
          description: Unauthorized
  /api/invitations/{invitationId}/accept:
    post:
      tags:
        - Invitations
      summary: Accept an invitation
      description: Accepts a pending invitation and adds the user to the household.
      operationId: acceptInvitation
      parameters:
        - name: invitationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successfully accepted invitation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
        '401':
          description: Unauthorized
        '404':
          description: Invitation not found
  /api/invitations/{invitationId}/decline:
    post:
      tags:
        - Invitations
      summary: Decline an invitation
      description: Declines a pending invitation.
      operationId: declineInvitation
      parameters:
        - name: invitationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successfully declined invitation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
        '401':
          description: Unauthorized
        '404':
          description: Invitation not found
  /api/notifications/vapid-public-key:
    get:
      tags:
        - Notifications
      summary: Get VAPID public key
      operationId: getVapidPublicKey
      responses:
        '200':
          description: VAPID public key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VapidPublicKey'
        '401':
          description: Unauthorized
  /api/notifications/subscriptions:
    post:
      tags:
        - Notifications
      summary: Register a push subscription
      operationId: registerSubscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushSubscriptionRequest'
      responses:
        '201':
          description: Successfully registered subscription
        '401':
          description: Unauthorized
components:
  securitySchemes:
    oauth:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://dajohnston.eu.auth0.com/authorize
          tokenUrl: https://dajohnston.eu.auth0.com/oauth/token
          scopes:
            openid: Grant audience to retrieve user profile
            email: Include email address
            offline_access: Grant access to refresh tokens
  schemas:
    ActuatorInfo:
      type: object
      properties:
        build:
          type: object
          properties:
            version:
              type: string
            artifact:
              type: string
            name:
              type: string
            group:
              type: string
          required:
            - version
            - artifact
            - name
            - group
      required:
        - build
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        auth0Id:
          type: string
        email:
          type: string
          format: email
        givenName:
          type: string
        familyName:
          type: string
        nickname:
          type: string
        picture:
          type: string
        households:
          type: array
          items:
            $ref: '#/components/schemas/Household'
      required:
        - id
        - auth0Id
        - email
        - displayName
        - households
    Household:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        role:
          $ref: '#/components/schemas/HouseholdRole'
      required:
        - id
        - name
        - role
    Households:
      type: array
      items:
        $ref: '#/components/schemas/Household'
    UpdateUserProfileRequest:
      type: object
      properties:
        givenName:
          type: string
        familyName:
          type: string
        nickname:
          type: string
        picture:
          type: string
        useGravatar:
          type: boolean
    CreateHouseholdRequest:
      type: object
      properties:
        name:
          type: string
      required:
        - name
    InviteUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/HouseholdRole'
      required:
        - email
        - role
    Invitation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        householdId:
          type: string
          format: uuid
        householdName:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/HouseholdRole'
        status:
          type: string
      required:
        - id
        - householdId
        - householdName
        - email
        - role
        - status
    Invitations:
      type: object
      properties:
        invitations:
          type: array
          items:
            $ref: '#/components/schemas/Invitation'
      required:
        - invitations
    App:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        url:
          type: string
      required:
        - id
        - name
        - url
    Apps:
      type: object
      properties:
        apps:
          type: array
          items:
            $ref: '#/components/schemas/App'
      required:
        - apps
    HouseholdRole:
      type: string
      enum: [ OWNER, MEMBER ]
    VapidPublicKey:
      type: object
      properties:
        publicKey:
          type: string
      required:
        - publicKey
    PushSubscriptionRequest:
      type: object
      properties:
        endpoint:
          type: string
        expirationTime:
          type: integer
          format: int64
          nullable: true
        keys:
          type: object
          properties:
            p256dh:
              type: string
            auth:
              type: string
          required:
            - p256dh
            - auth
      required:
        - endpoint
        - keys
security:
  - oauth: [ openid, email, offline_access ]
