openapi: 3.1.1
info:
  title: Spice Tracker API
  version: 1.0.0
  description: API for the Spice Tracker sub-application.

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /api/spices:
    get:
      tags:
        - Spices
      summary: List spices in the household
      operationId: listSpices
      parameters:
        - $ref: '#/components/parameters/HouseholdHeader'
      responses:
        '200':
          description: Successfully retrieved spices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Spices'
        '401':
          description: Unauthorized
    post:
      tags:
        - Spices
      summary: Define a new spice
      operationId: createSpice
      parameters:
        - $ref: '#/components/parameters/HouseholdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSpice'
      responses:
        '201':
          description: Spice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Spice'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized

  /api/spices/{id}:
    delete:
      tags:
        - Spices
      summary: Remove a spice
      operationId: removeSpice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/HouseholdHeader'
      responses:
        '204':
          description: Spice removed
        '401':
          description: Unauthorized
        '404':
          description: Spice not found

  /api/pantry:
    get:
      tags:
        - Pantry
      summary: List jars in the pantry
      operationId: listPantryJars
      parameters:
        - $ref: '#/components/parameters/HouseholdHeader'
      responses:
        '200':
          description: Successfully retrieved pantry jars
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PantryJars'
        '401':
          description: Unauthorized
    post:
      tags:
        - Pantry
      summary: Add a jar to the pantry
      operationId: addPantryJar
      parameters:
        - $ref: '#/components/parameters/HouseholdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPantryJar'
      responses:
        '201':
          description: Jar added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PantryJar'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized

  /api/pantry/{id}:
    patch:
      tags:
        - Pantry
      summary: Update a jar in the pantry
      operationId: updatePantryJar
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/HouseholdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePantryJar'
      responses:
        '200':
          description: Jar updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PantryJar'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Jar not found
    delete:
      tags:
        - Pantry
      summary: Remove a jar from the pantry
      operationId: removePantryJar
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/HouseholdHeader'
      responses:
        '204':
          description: Jar removed
        '401':
          description: Unauthorized
        '404':
          description: Jar not found

components:
  parameters:
    HouseholdHeader:
      in: header
      name: X-Household-Id
      required: true
      schema:
        type: string
        format: uuid
  securitySchemes:
    oauth:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://dajohnston.eu.auth0.com/authorize
          tokenUrl: https://dajohnston.eu.auth0.com/oauth/token
          scopes:
            openid: Grant audience to retrieve user profile
            email: Include email address
            offline_access: Grant access to refresh tokens
  schemas:
    Spice:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
      required:
        - id
        - name
    Spices:
      type: object
      properties:
        spices:
          type: array
          items:
            $ref: '#/components/schemas/Spice'
      required:
        - spices
    CreateSpice:
      type: object
      properties:
        name:
          type: string
          minLength: 1
      required:
        - name
    PantryJar:
      type: object
      properties:
        id:
          type: string
          format: uuid
        spiceId:
          type: string
          format: uuid
        spiceName:
          type: string
        quantity:
          type: integer
          minimum: 0
          maximum: 100
      required:
        - id
        - spiceId
        - spiceName
        - quantity
    PantryJars:
      type: object
      properties:
        jars:
          type: array
          items:
            $ref: '#/components/schemas/PantryJar'
      required:
        - jars
    AddPantryJar:
      type: object
      properties:
        spiceId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 0
          maximum: 100
          default: 100
      required:
        - spiceId
    UpdatePantryJar:
      type: object
      properties:
        quantity:
          type: integer
          minimum: 0
          maximum: 100
      required:
        - quantity

security:
  - oauth: [ openid, email, offline_access ]
