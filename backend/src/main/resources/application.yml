server:
  port: ${PORT:8080}
  shutdown: graceful
spring:
  application:
    name: portal-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/portal_db}
    username: ${DATABASE_USERNAME:portal_user}
    password: ${DATABASE_PASSWORD:portal_password}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH0_ISSUER_URI:https://dajohnston.eu.auth0.com/}
          audience: ${AUTH0_AUDIENCE:https://api.dajohnston.co.uk}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    build:
      enabled: true
