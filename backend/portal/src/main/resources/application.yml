server:
  port: ${PORT:8080}
  shutdown: graceful
spring:
  application:
    name: portal-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/portal_db}
    username: ${DATABASE_USERNAME:portal_app}
    password: ${DATABASE_PASSWORD:portal_app_password}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration/postgresql
    user: ${FLYWAY_USER:portal_user}
    password: ${FLYWAY_PASSWORD:portal_password}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH0_ISSUER_URI:https://dajohnston.eu.auth0.com/}
          audience: ${AUTH0_AUDIENCE:https://api.dajohnston.co.uk}
auth0:
  management:
    domain: ${AUTH0_DOMAIN:dajohnston.eu.auth0.com}
    clientId: ${AUTH0_MANAGEMENT_CLIENT_ID:}
    clientSecret: ${AUTH0_MANAGEMENT_CLIENT_SECRET:}
vapid:
  publicKey: ${VAPID_PUBLIC_KEY:}
  privateKey: ${VAPID_PRIVATE_KEY:}
management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  info:
    build:
      enabled: true
logging:
  level:
    uk.co.dajohnston: DEBUG
    org.zalando.logbook: TRACE
  structured:
    format:
      console: logstash
