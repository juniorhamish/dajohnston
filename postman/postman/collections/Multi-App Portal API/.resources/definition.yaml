$kind: collection
name: Multi-App Portal API
description: API collection for the Multi-App Portal system.
variables:
  base_url: http://localhost:8080
  auth0_domain: dajohnston.eu.auth0.com
  client_id: ""
  client_secret: ""
auth:
  type: oauth2
  credentials:
    scope: openid profile email offline_access
    authRequestParams:
      - key: audience
        value: https://api.dajohnston.co.uk
        enabled: true
        send_as: request_url
    useBrowser: false
    clientSecret: "{{client_secret}}"
    clientId: "{{client_id}}"
    accessTokenUrl: https://{{auth0_domain}}/oauth/token
    authUrl: https://{{auth0_domain}}/authorize
    redirect_uri: http://localhost:3000/api/auth/callback
    tokenName: DevToken
    addTokenTo: header
