apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami-test
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami-test
  template:
    metadata:
      labels:
        app: whoami-test
    spec:
      containers:
        - name: whoami
          image: traefik/whoami
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: whoami-test
  namespace: default
spec:
  selector:
    app: whoami-test
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whoami-test
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  rules:
    - host: dajohnston.ddns.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whoami-test
                port:
                  number: 80
