name: Deploy Backend

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  GCP_REGION: europe-west1
  GCP_REPOSITORY: portal-artifacts
  GCP_SERVICE: portal-backend
  IMAGE_NAME: portal-backend
  APP_VERSION: 0.1.${{ github.run_number }}

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: '${{ secrets.GCP_WIF_PROVIDER }}'
          service_account: '${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}'
          token_format: 'access_token'

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set Image Tag
        run: |
          SHA_TAG=${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          VER_TAG=${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ env.APP_VERSION }}
          echo "IMAGE_TAG=${SHA_TAG},${VER_TAG}" >> $GITHUB_ENV
          echo "DEPLOY_IMAGE=${SHA_TAG}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_TAG }}
          build-args: VERSION=${{ env.APP_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        id: deploy
        uses: 'google-github-actions/deploy-cloudrun@v3'
        with:
          service: '${{ env.GCP_SERVICE }}'
          region: '${{ env.GCP_REGION }}'
          image: '${{ env.DEPLOY_IMAGE }}'

      - name: Show Output
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
