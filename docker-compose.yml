services:
  postgres:
    image: postgres:18-alpine
    container_name: portal-postgres
    environment:
      POSTGRES_DB: portal_db
      POSTGRES_USER: portal_user
      POSTGRES_PASSWORD: portal_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U portal_user -d portal_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
